<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Two-Mode RPN Tomography · State Reconstruction</title>
<style>
  :root{
    --paper:#FFFFFF; --paper-2:#FFFFFF;
    --ink:#25241F; --ink-soft:#5A584F; --ink-faint:#8A8779;
    --accent:#1C6E5E; --accent-soft-bg:rgba(28,110,94,0.10);
    --rule:rgba(37,36,31,0.14); --border-2:rgba(37,36,31,0.18); --border-3:rgba(37,36,31,0.10);
    --color-text-primary:var(--ink); --color-text-secondary:var(--ink-soft);
    --color-border-secondary:var(--border-2); --color-border-tertiary:var(--border-3);
    --color-background-info:var(--accent-soft-bg); --color-text-info:var(--accent);
    --border-radius-md:7px;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua","URW Palladio L",Georgia,serif;
    --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{ font-family:var(--sans); color:var(--ink); background:#FFFFFF;
    -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh; }
  .wrap{max-width:920px; margin:0 auto; padding:clamp(20px,4vw,52px) clamp(16px,4vw,32px) 64px;}
  .sheet{ background:color-mix(in srgb, var(--paper-2) 92%, transparent); border:0.5px solid var(--border-2); border-radius:14px; padding:clamp(20px,3.5vw,40px); box-shadow:0 1px 0 color-mix(in srgb, var(--ink) 6%, transparent), 0 24px 48px -32px rgba(0,0,0,0.45); backdrop-filter:blur(2px); }
  .eyebrow{font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); font-weight:600; margin:0 0 12px;}
  h1{font-family:var(--serif); font-weight:600; font-size:clamp(24px,4.2vw,38px); line-height:1.08; margin:0 0 10px; letter-spacing:-.01em;}
  .lede{font-size:15px; color:var(--ink-soft); max-width:66ch; margin:0;}
  .rule{height:1px; background:linear-gradient(90deg, var(--accent), transparent 72%); border:0; margin:22px 0;}
  .flow{display:flex;flex-wrap:wrap;gap:8px 6px;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);border:0.5px solid var(--border-2);border-radius:10px;padding:12px 14px;background:color-mix(in srgb, var(--paper) 60%, transparent);}
  .flow b{color:var(--accent);font-weight:600}
  .flow .ar{color:var(--ink-faint);padding:0 2px}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  .seg{display:inline-flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;border-right:0.5px solid var(--color-border-tertiary);border-radius:0;padding:7px 12px;font-size:12.5px;background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--sans)}
  .seg button:last-child{border-right:0}
  .seg button[aria-pressed="true"]{background:var(--color-background-info);color:var(--color-text-info);font-weight:600}
  .lbl{font-size:13px;color:var(--color-text-secondary)}
  .cap{font-size:13px;color:var(--color-text-secondary);margin:0 0 6px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:3px;background:var(--border-2);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--paper-2);box-shadow:0 0 0 1px var(--accent)}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--paper-2)}
  input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px}
  .btn{font-family:var(--sans);font-size:13px;padding:9px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--border-2);background:var(--accent);color:var(--paper-2);font-weight:600;cursor:pointer}
  .btn.sec{background:transparent;color:var(--ink-soft);font-weight:500}
  .grp{display:flex;flex-direction:column;gap:6px;min-width:160px;flex:1}
  .maps{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:22px;margin-top:1rem;}
  .fid{font-family:var(--serif);font-size:13px;font-weight:600;margin-top:10px}
  details{margin-top:26px;border-top:1px solid var(--rule);padding-top:14px}
  summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸";display:inline-block;margin-right:8px;color:var(--accent);transition:transform .15s}
  details[open] summary::before{transform:rotate(90deg)}
  details p{font-size:13.5px;color:var(--ink-soft);max-width:74ch}
  details code{font-family:var(--mono);font-size:12.5px;background:var(--accent-soft-bg);color:var(--accent);padding:1px 5px;border-radius:4px}
  .foot{margin-top:30px;font-size:12px;color:var(--ink-faint);text-align:center;font-family:var(--serif);font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <div class="sheet">
    <div style="display:flex;flex-wrap:wrap;gap:16px 22px;align-items:flex-end;">
      <div class="grp">
        <span class="lbl" style="white-space:nowrap;">Measurement configurations K = <span id="oK" style="color:var(--ink);font-weight:600;">60</span></span>
        <input type="range" id="rK" min="20" max="220" step="5" value="60" />
      </div>
      <div class="grp">
        <span class="lbl">Shots per configuration = <span id="oSh" style="color:var(--ink);font-weight:600;">2000</span></span>
        <input type="range" id="rSh" min="100" max="10000" step="100" value="2000" />
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);cursor:pointer;">
        <input type="checkbox" id="cFixed" checked /> fixed displacement
      </label>
    </div>

    <div style="margin-top:18px; padding:14px; border:1px solid var(--line); border-radius:10px;">
      <div style="display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start;">
        <div style="flex:1 1 240px; min-width:230px;">
          <span class="lbl">Displacement configuration</span>
          <div class="seg" role="group" aria-label="Displacement configuration" style="margin:6px 0 12px;">
            <button id="cfgCol" aria-pressed="true">colinear</button>
            <button id="cfgInd" aria-pressed="false">independent</button>
          </div>
          <div id="dispVals" style="font-family:var(--mono); font-size:13px; line-height:1.7;"></div>
        </div>
        <div style="position:relative; width:140px; height:140px; flex:0 0 auto; margin-top:-6px;"><canvas id="cDisp"></canvas></div>
      </div>
    </div>

    <div style="display:flex; gap:18px; align-items:flex-end; margin-top:6px;">
      <div class="maps" style="flex:1 1 auto; min-width:0; margin-top:0;">
      <div>
        <p class="cap" style="font-weight:600; min-height:40px; display:flex; flex-direction:column; justify-content:flex-end;"><span style="color:var(--ink-faint);font-weight:400;">TMSV: |ψ⟩ ∝ |00⟩ + tanh(½)|11⟩ + tanh²(½)|22⟩</span><span>True state &nbsp;<span id="capR" style="color:var(--ink-faint);font-weight:400;">Re(ρ)</span></span></p>
        <div style="position:relative;width:100%;height:300px;"><canvas id="cTrue"></canvas></div>
      </div>
      <div>
        <p class="cap" style="font-weight:600; min-height:40px; display:flex; flex-direction:column; justify-content:flex-end;"><span>Reconstruction &nbsp;<span id="capH" style="color:var(--ink-faint);font-weight:400;">Re(ρ̂)</span></span></p>
        <div style="position:relative;width:100%;height:300px;"><canvas id="cRec"></canvas></div>
      </div>
      </div>
      <div style="flex:0 0 auto; position:relative; width:64px; height:300px;"><canvas id="cBar"></canvas></div>
    </div>
    <p class="fid" id="fid"></p>
    <!-- =================== END WIDGET =================== -->
  </div>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const mq={matches:false};
  const FONT='ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif';
  const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
  const Nmax=9;

  // ---- special functions ----
  const LF=[0,0]; function logFact(n){ while(LF.length<=n){const k=LF.length; LF.push(LF[k-1]+Math.log(k));} return LF[n]; }
  function assocLag(n,a,x){ if(n===0)return 1; let l0=1,l1=1+a-x; if(n===1)return l1; for(let k=1;k<n;k++){const l2=((2*k+1+a-x)*l1-(k+a)*l0)/(k+1); l0=l1; l1=l2;} return l1; }
  function cpow(re,im,p){ let rr=1,ii=0; for(let q=0;q<p;q++){const nr=rr*re-ii*im, ni=rr*im+ii*re; rr=nr; ii=ni;} return [rr,ii]; }
  function dmn(m,n,Are,Aim){ const a2=Are*Are+Aim*Aim; if(a2<1e-14)return [m===n?1:0,0]; const pre=Math.exp(-a2/2);
    if(m>=n){ const c=Math.exp(0.5*(logFact(n)-logFact(m)))*pre*assocLag(n,m-n,a2); const pw=cpow(Are,Aim,m-n); return [c*pw[0],c*pw[1]]; }
    else { const c=Math.exp(0.5*(logFact(m)-logFact(n)))*pre*assocLag(m,n-m,a2); const pw=cpow(-Are,Aim,n-m); return [c*pw[0],c*pw[1]]; } }

  // ---- basis / pairs ----
  const lab=i=>''+Math.floor(i/3)+(i%3);
  const labKet=i=>'|'+Math.floor(i/3)+(i%3)+'⟩';
  const labBra=i=>'⟨'+Math.floor(i/3)+(i%3)+'|';
  const pairs=[]; for(let a=0;a<9;a++)for(let b=a+1;b<9;b++)pairs.push([a,b]); // 36

  // ---- true state ----
  let stype='tmsv', trueR=new Float64Array(81), trueI=new Float64Array(81);
  function setPure(amps){ // amps: array of [idx, value] (real)
    trueR=new Float64Array(81); trueI=new Float64Array(81);
    for(const [i,vi] of amps) for(const [j,vj] of amps){ trueR[i*9+j]+=vi*vj; }
  }
  function buildTrue(){
    if(stype==='bell'){ const s=1/Math.SQRT2; setPure([[3,s],[1,s]]); } // |1,0> idx3, |0,1> idx1
    else if(stype==='noon'){ const s=1/Math.SQRT2; setPure([[6,s],[2,s]]); } // |2,0> idx6, |0,2> idx2
    else if(stype==='tmsv'){ const la=Math.tanh(0.5); let c0=1,c1=la,c2=la*la; const nrm=Math.sqrt(c0*c0+c1*c1+c2*c2); setPure([[0,c0/nrm],[4,c1/nrm],[8,c2/nrm]]); } // |00>,|11>,|22>
    else if(stype==='product'){ setPure([[4,1]]); } // |1,1> idx4
    else { // thermal mixed
      trueR=new Float64Array(81); trueI=new Float64Array(81); const nb=0.7; const p=[]; let s=0;
      for(let k=0;k<3;k++){ p[k]=Math.pow(nb,k)/Math.pow(1+nb,k+1); s+=p[k]; } for(let k=0;k<3;k++)p[k]/=s;
      let tr=0; for(let n=0;n<3;n++)for(let m=0;m<3;m++){ const idx=(3*n+m); trueR[idx*9+idx]=p[n]*p[m]; tr+=p[n]*p[m]; }
      for(let i=0;i<81;i++)trueR[i*0]; // noop
      // renormalize trace (already ~1)
      let t2=0; for(let d=0;d<9;d++)t2+=trueR[d*9+d]; if(t2>0)for(let i=0;i<81;i++)trueR[i]/=t2;
      return;
    }
    // normalize trace for pure
    let t2=0; for(let d=0;d<9;d++)t2+=trueR[d*9+d]; if(t2>0)for(let i=0;i<81;i++)trueR[i]/=t2;
  }

  // ---- forward model: measurement operator for a config ----
  function computeRow(cf){
    const da=[], db=[];
    for(let Nn=0;Nn<=Nmax;Nn++) da.push([dmn(Nn,0,cf.aRe,cf.aIm),dmn(Nn,1,cf.aRe,cf.aIm),dmn(Nn,2,cf.aRe,cf.aIm)]);
    for(let Mm=0;Mm<=Nmax+1;Mm++) db.push([dmn(Mm,0,cf.bRe,cf.bIm),dmn(Mm,1,cf.bRe,cf.bIm),dmn(Mm,2,cf.bRe,cf.bIm)]);
    const SR=new Float64Array(81), SI=new Float64Array(81);
    const AvR=new Float64Array(9), AvI=new Float64Array(9);
    for(let Nn=0;Nn<=Nmax;Nn++){ const ca=Math.cos(0.5*Math.sqrt(Nn+1)*cf.t1), sa=(Nn>=1)?Math.sin(0.5*Math.sqrt(Nn)*cf.t1):0;
      for(let Mm=0;Mm<=Nmax;Mm++){ const cb=Math.cos(0.5*Math.sqrt(Mm+1)*cf.t2), sb=Math.sin(0.5*Math.sqrt(Mm+1)*cf.t2);
        for(let k=0;k<3;k++)for(let l=0;l<3;l++){ const a=3*k+l;
          const d1=da[Nn][k], e1=db[Mm][l]; const pr1=ca*cb;
          let r=pr1*(d1[0]*e1[0]-d1[1]*e1[1]), im=pr1*(d1[0]*e1[1]+d1[1]*e1[0]);
          if(Nn>=1){ const d2=da[Nn-1][k], e2=db[Mm+1][l]; const pr2=-sa*sb; r+=pr2*(d2[0]*e2[0]-d2[1]*e2[1]); im+=pr2*(d2[0]*e2[1]+d2[1]*e2[0]); }
          AvR[a]=r; AvI[a]=im;
        }
        for(let a=0;a<9;a++){ const arR=AvR[a], arI=AvI[a]; if(arR!==0||arI!==0){ for(let b=0;b<9;b++){ const idx=a*9+b; SR[idx]+=arR*AvR[b]+arI*AvI[b]; SI[idx]+=arI*AvR[b]-arR*AvI[b]; } } }
      }
    }
    const coef=new Float64Array(81); let pe=0;
    for(let d=0;d<9;d++) coef[d]=SR[d*9+d];
    for(let p=0;p<pairs.length;p++){ const a=pairs[p][0], b=pairs[p][1], idx=a*9+b; coef[9+2*p]=2*SR[idx]; coef[10+2*p]=-2*SI[idx]; }
    for(let a=0;a<9;a++)for(let b=0;b<9;b++){ const idx=a*9+b; pe+=trueR[idx]*SR[idx]-trueI[idx]*SI[idx]; }
    return {coef, pe};
  }

  // ---- linear solver (LU, partial pivot) ----
  function solveLin(Araw,braw,n){ const A=Araw.slice(), x=braw.slice();
    for(let col=0;col<n;col++){ let mx=Math.abs(A[col*n+col]), mr=col; for(let r=col+1;r<n;r++){const v=Math.abs(A[r*n+col]); if(v>mx){mx=v;mr=r;}}
      if(mr!==col){ for(let c=0;c<n;c++){const t=A[col*n+c];A[col*n+c]=A[mr*n+c];A[mr*n+c]=t;} const tb=x[col];x[col]=x[mr];x[mr]=tb; }
      const d=A[col*n+col]||1e-12; for(let r=col+1;r<n;r++){ const f=A[r*n+col]/d; if(f!==0){ for(let c=col;c<n;c++)A[r*n+c]-=f*A[col*n+c]; x[r]-=f*x[col]; } } }
    for(let i=n-1;i>=0;i--){ let s=x[i]; for(let c=i+1;c<n;c++)s-=A[i*n+c]*x[c]; x[i]=s/(A[i*n+i]||1e-12); } return x; }

  // ---- Hermitian eigensolver via real 2n×2n embedding + cyclic Jacobi ----
  function jacobiSym(Ain,n){ const a=Ain.slice(); const v=new Float64Array(n*n); for(let i=0;i<n;i++)v[i*n+i]=1;
    for(let it=0;it<100;it++){ let off=0; for(let p=0;p<n;p++)for(let q=p+1;q<n;q++)off+=Math.abs(a[p*n+q]); if(off<1e-14)break;
      for(let p=0;p<n;p++)for(let q=p+1;q<n;q++){ const apq=a[p*n+q]; if(Math.abs(apq)<1e-300)continue;
        const app=a[p*n+p], aqq=a[q*n+q]; const theta=(aqq-app)/(2*apq);
        let t; if(theta===0)t=1; else t=(theta>0?1:-1)/(Math.abs(theta)+Math.sqrt(theta*theta+1));
        const c=1/Math.sqrt(t*t+1), s=t*c;
        for(let k=0;k<n;k++){ const akp=a[k*n+p], akq=a[k*n+q]; a[k*n+p]=c*akp-s*akq; a[k*n+q]=s*akp+c*akq; }
        for(let k=0;k<n;k++){ const apk=a[p*n+k], aqk=a[q*n+k]; a[p*n+k]=c*apk-s*aqk; a[q*n+k]=s*apk+c*aqk; }
        for(let k=0;k<n;k++){ const vkp=v[k*n+p], vkq=v[k*n+q]; v[k*n+p]=c*vkp-s*vkq; v[k*n+q]=s*vkp+c*vkq; }
      } }
    const ev=new Float64Array(n); for(let i=0;i<n;i++)ev[i]=a[i*n+i]; return {ev,v}; }
  function hermEig(HR,HI,n){ const N=2*n, T=new Float64Array(N*N);
    for(let i=0;i<n;i++)for(let j=0;j<n;j++){ const A=HR[i*n+j], B=HI[i*n+j]; T[i*N+j]=A; T[i*N+(j+n)]=-B; T[(i+n)*N+j]=B; T[(i+n)*N+(j+n)]=A; }
    const r=jacobiSym(T,N); return {ev:r.ev, v:r.v, N}; }
  function matSqrtH(HR,HI,n){ const {ev,v,N}=hermEig(HR,HI,n); const SR=new Float64Array(n*n), SI=new Float64Array(n*n);
    for(let j=0;j<N;j++){ const sl=Math.sqrt(Math.max(ev[j],0)); if(sl<1e-15)continue;
      for(let a=0;a<n;a++){ const xr=v[a*N+j], xi=v[(a+n)*N+j]; for(let b=0;b<n;b++){ const yr=v[b*N+j], yi=v[(b+n)*N+j];
        SR[a*n+b]+=0.5*sl*(xr*yr+xi*yi); SI[a*n+b]+=0.5*sl*(xi*yr-xr*yi); } } }
    return {SR,SI}; }
  function traceSqrtH(HR,HI,n){ const {ev,N}=hermEig(HR,HI,n); let s=0; for(let j=0;j<N;j++)s+=Math.sqrt(Math.max(ev[j],0)); return 0.5*s; }
  function cmatmul(AR,AI,BR,BI,n){ const CR=new Float64Array(n*n), CI=new Float64Array(n*n);
    for(let i=0;i<n;i++)for(let j=0;j<n;j++){ let r=0,im=0; for(let k=0;k<n;k++){ const ar=AR[i*n+k],ai=AI[i*n+k],br=BR[k*n+j],bi=BI[k*n+j]; r+=ar*br-ai*bi; im+=ar*bi+ai*br; } CR[i*n+j]=r; CI[i*n+j]=im; } return {CR,CI}; }
  function uhlmann(rR,rI,sR,sI,n){ const sq=matSqrtH(rR,rI,n); const m1=cmatmul(sq.SR,sq.SI,sR,sI,n); const M=cmatmul(m1.CR,m1.CI,sq.SR,sq.SI,n); const tr=traceSqrtH(M.CR,M.CI,n); return tr*tr; }
  function purity(MR,MI,n){ let s=0; for(let i=0;i<n*n;i++)s+=MR[i]*MR[i]+MI[i]*MI[i]; return s; }
  function rankSym(M,n,relTol){ const {ev}=jacobiSym(M,n); let mx=0; for(let i=0;i<n;i++){const a=Math.abs(ev[i]); if(a>mx)mx=a;} let r=0; for(let i=0;i<n;i++) if(Math.abs(ev[i])>relTol*mx) r++; return r; }
  // Rank via incremental (modified, double) Gram-Schmidt on the measurement rows — robust at the spectral gap
  function gsRank(rows, tol){ const basis=[]; for(const r of rows){ const v=Float64Array.from(r); let n0=0; for(let i=0;i<81;i++)n0+=v[i]*v[i]; n0=Math.sqrt(n0); if(n0===0)continue;
      for(let pass=0;pass<2;pass++) for(const b of basis){ let d=0; for(let i=0;i<81;i++)d+=v[i]*b[i]; for(let i=0;i<81;i++)v[i]-=d*b[i]; }
      let nr=0; for(let i=0;i<81;i++)nr+=v[i]*v[i]; nr=Math.sqrt(nr);
      if(nr>tol*n0){ for(let i=0;i<81;i++)v[i]/=nr; basis.push(v); } } return basis.length; }
  // Rank(K) curve in a single pass: fixed or scanning displacement, fresh RNG from seed
  function traceDist(rR,rI,sR,sI,n){ const dR=new Float64Array(n*n), dI=new Float64Array(n*n);
    for(let i=0;i<n*n;i++){ dR[i]=rR[i]-sR[i]; dI[i]=rI[i]-sI[i]; }
    const {ev}=hermEig(dR,dI,n); let s=0; for(let j=0;j<ev.length;j++)s+=Math.abs(ev[j]); return 0.25*s; } // ½·Tr|ρ−σ|, factor ¼ due to the 18-dim doubling
  function classFid(rR,sR,n){ let s=0; for(let i=0;i<n;i++){ const p=Math.max(rR[i*n+i],0), q=Math.max(sR[i*n+i],0); s+=Math.sqrt(p*q); } return s*s; }

  // ---- projection-free PSD reconstruction: minimize ‖𝓜ρ−P‖² over {ρ⪰0, Trρ=1} (SDP, Frank–Wolfe) ----
  // Linear oracle per step = eigenvector for the smallest eigenvalue of the gradient Ḡ (rank-1 vertex), NO projection.
  function sdpFrankWolfe(A,b,np,iters){
    const th=new Float64Array(np); for(let d=0;d<9;d++)th[d]=1/9;          // start ρ₀ = 𝟙/9
    const Ath=new Float64Array(np), dvec=new Float64Array(np), Ad=new Float64Array(np);
    const GR=new Float64Array(81), GI=new Float64Array(81), ths=new Float64Array(np);
    const vR=new Float64Array(9), vI=new Float64Array(9);
    for(let it=0;it<iters;it++){
      for(let i=0;i<np;i++){ let s=0; const ro=i*np; for(let j=0;j<np;j++)s+=A[ro+j]*th[j]; Ath[i]=s; }
      // gradient as Hermitian 9×9 matrix Ḡ (diagonal weight 1, off-diagonal weight ½ from the packing)
      GR.fill(0); GI.fill(0);
      for(let d=0;d<9;d++) GR[d*9+d]=Ath[d]-b[d];
      for(let p=0;p<pairs.length;p++){ const a=pairs[p][0], bb=pairs[p][1];
        const gr=0.5*(Ath[9+2*p]-b[9+2*p]), gi=0.5*(Ath[10+2*p]-b[10+2*p]);
        GR[a*9+bb]=gr; GR[bb*9+a]=gr; GI[a*9+bb]=gi; GI[bb*9+a]=-gi; }
      // LMO: smallest-eigenvalue eigenvector of Ḡ  → vertex s = v v†
      const {ev,v,N}=hermEig(GR,GI,9);
      let jm=0; for(let j=1;j<N;j++) if(ev[j]<ev[jm]) jm=j;
      for(let a=0;a<9;a++){ vR[a]=v[a*N+jm]; vI[a]=v[(a+9)*N+jm]; }
      for(let d=0;d<9;d++) ths[d]=vR[d]*vR[d]+vI[d]*vI[d];
      for(let p=0;p<pairs.length;p++){ const a=pairs[p][0], bb=pairs[p][1];
        ths[9+2*p]=vR[a]*vR[bb]+vI[a]*vI[bb]; ths[10+2*p]=vI[a]*vR[bb]-vR[a]*vI[bb]; }
      // exact line search along ρ→ρ+γ(s−ρ): γ* = d·(b−Aρ)/(d·A·d), γ∈[0,1]
      for(let i=0;i<np;i++) dvec[i]=ths[i]-th[i];
      let gnum=0; for(let i=0;i<np;i++) gnum+=dvec[i]*(b[i]-Ath[i]);
      for(let i=0;i<np;i++){ let s=0; const ro=i*np; for(let j=0;j<np;j++)s+=A[ro+j]*dvec[j]; Ad[i]=s; }
      let gden=0; for(let i=0;i<np;i++) gden+=dvec[i]*Ad[i];
      let g = gden>1e-14 ? gnum/gden : 0; if(g<0)g=0; if(g>1)g=1;
      for(let i=0;i<np;i++) th[i]+=g*dvec[i];
      if(g<1e-11 && it>80) break;
    }
    return th;
  }

  // ---- PRNG ----
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  function gauss(rng){ let u=0,v=0; while(u===0)u=rng(); while(v===0)v=rng(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

  // ---- state of UI ----
  let curK=60, shots=2000, noiseless=false, usePSD=true, fixedDisp=true, seed=12345, mode='re';
  let alphaRe=1, alphaIm=1, betaRe=-1, betaIm=-1;
  let recR=new Float64Array(81), recI=new Float64Array(81), fidelity=0, fidClass=0, tdist=0, lmin=0, mrank=0, ran=false;

  function run(){
    const rng=mulberry32(seed), K=curK, NP=81;
    const cfgs=[];
    if(fixedDisp){ const aRe=alphaRe, aIm=alphaIm, bRe=betaRe, bIm=betaIm;
      for(let r=0;r<K;r++) cfgs.push({aRe,aIm,bRe,bIm,t1:0.3+rng()*(2*Math.PI-0.3),t2:0.3+rng()*(2*Math.PI-0.3)}); }
    else { for(let r=0;r<K;r++){ const am=1.3*Math.sqrt(rng()), ap=2*Math.PI*rng(), bm=1.3*Math.sqrt(rng()), bp=2*Math.PI*rng(); cfgs.push({aRe:am*Math.cos(ap),aIm:am*Math.sin(ap),bRe:bm*Math.cos(bp),bIm:bm*Math.sin(bp),t1:0.3+rng()*(2*Math.PI-0.3),t2:0.3+rng()*(2*Math.PI-0.3)}); } }
    const rows=[], P=new Float64Array(K);
    for(let r=0;r<K;r++){ const {coef,pe}=computeRow(cfgs[r]); rows.push(coef); let meas=pe; if(!noiseless){ const sd=Math.sqrt(Math.max(pe*(1-pe),1e-6)/shots); meas=pe+gauss(rng)*sd; } P[r]=clamp(meas,0,1); }
    const GtG=new Float64Array(NP*NP), Gtp=new Float64Array(NP);
    for(let r=0;r<K;r++){ const g=rows[r], pr=P[r]; for(let i=0;i<NP;i++){ const gi=g[i]; if(gi!==0){ Gtp[i]+=gi*pr; for(let j=i;j<NP;j++) GtG[i*NP+j]+=gi*g[j]; } } }
    for(let i=0;i<NP;i++)for(let j=i+1;j<NP;j++)GtG[j*NP+i]=GtG[i*NP+j];
    mrank=gsRank(rows,1e-7);
    let avg=0; for(let i=0;i<NP;i++)avg+=GtG[i*NP+i]; avg/=NP; const lam=1e-6*avg+1e-12; for(let i=0;i<NP;i++)GtG[i*NP+i]+=lam;
    const th = usePSD ? sdpFrankWolfe(GtG,Gtp,NP,1000) : solveLin(GtG,Gtp,NP);
    recR=new Float64Array(81); recI=new Float64Array(81);
    for(let d=0;d<9;d++) recR[d*9+d]=th[d];
    for(let p=0;p<pairs.length;p++){ const a=pairs[p][0], b=pairs[p][1], x=th[9+2*p], y=th[10+2*p]; recR[a*9+b]=x; recI[a*9+b]=y; recR[b*9+a]=x; recI[b*9+a]=-y; }
    let tr=0; for(let d=0;d<9;d++)tr+=recR[d*9+d]; if(Math.abs(tr)>1e-6)for(let i=0;i<81;i++){recR[i]/=tr;recI[i]/=tr;}
    fidelity=clamp(uhlmann(trueR,trueI,recR,recI,9),0,1); fidClass=clamp(classFid(trueR,recR,9),0,1); tdist=clamp(traceDist(trueR,trueI,recR,recI,9),0,1); lmin=Math.min.apply(null,Array.from(hermEig(recR,recI,9).ev)); ran=true;
    draw();
  }

  // ---- rendering ----
  const RB=[[33,102,172],[67,147,195],[146,197,222],[247,247,247],[244,165,130],[214,96,77],[178,24,43]];
  function rdbu(u){ u=clamp(u,-1,1); const x=(u+1)/2*6, i=Math.floor(x), f=x-i; const a=RB[i],b=RB[Math.min(i+1,6)]; return [Math.round(a[0]+(b[0]-a[0])*f),Math.round(a[1]+(b[1]-a[1])*f),Math.round(a[2]+(b[2]-a[2])*f)]; }
  const SQ=[[244,242,232],[60,158,135],[12,63,54]];
  const SQD=[[26,29,34],[57,170,148],[170,232,214]];
  function seqMap(u){ const S=mq.matches?SQD:SQ; u=clamp(u,0,1); const x=u*2,i=Math.floor(x),f=x-i; const a=S[i],b=S[Math.min(i+1,2)]; return [Math.round(a[0]+(b[0]-a[0])*f),Math.round(a[1]+(b[1]-a[1])*f),Math.round(a[2]+(b[2]-a[2])*f)]; }
  function theme(){ const d=mq.matches; return { text:d?'#DAD8CE':'#25241F', muted:d?'#ABA99F':'#5A584F', axis:d?'rgba(218,216,206,0.42)':'rgba(37,36,31,0.34)' }; }
  function setup(cv){ const dpr=window.devicePixelRatio||1; const r=cv.parentNode.getBoundingClientRect(); const w=Math.max(10,Math.floor(r.width)), h=Math.max(10,Math.floor(r.height)); cv.width=Math.floor(w*dpr); cv.height=Math.floor(h*dpr); cv.style.width=w+'px'; cv.style.height=h+'px'; const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); return {ctx,w,h}; }

  function cmaxVal(){ let m=0.001; for(let i=0;i<81;i++){ const v=(mode==='re')?Math.abs(trueR[i]):Math.hypot(trueR[i],trueI[i]); if(v>m)m=v; const vr=ran?((mode==='re')?Math.abs(recR[i]):Math.hypot(recR[i],recI[i])):0; if(vr>m)m=vr; } return m; }

  function renderMatrix(cv,MR,MI){
    const t=theme(); const {ctx,w,h}=setup(cv); ctx.clearRect(0,0,w,h);
    const L=30,Tp=16,Rt=10,Bt=6; const S=Math.max(40,Math.min(w-L-Rt,h-Tp-Bt)); const cell=S/9, x0=L,y0=Tp; const cmax=cmaxVal();
    for(let a=0;a<9;a++)for(let b=0;b<9;b++){ const idx=a*9+b; let col; if(mode==='re') col=rdbu(MR[idx]/cmax); else col=seqMap(Math.hypot(MR[idx],MI[idx])/cmax);
      ctx.fillStyle='rgb('+col[0]+','+col[1]+','+col[2]+')'; ctx.fillRect(x0+b*cell,y0+a*cell,Math.ceil(cell)-0.5,Math.ceil(cell)-0.5); }
    ctx.strokeStyle=t.axis; ctx.lineWidth=1; ctx.strokeRect(x0,y0,9*cell,9*cell);
    ctx.fillStyle=t.muted; ctx.font='8px '+FONT; ctx.textAlign='center'; ctx.textBaseline='bottom';
    for(let b=0;b<9;b++) ctx.fillText(labBra(b),x0+b*cell+cell/2,y0-2);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    for(let a=0;a<9;a++) ctx.fillText(labKet(a),x0-3,y0+a*cell+cell/2);
  }
  function renderBar(){
    const t=theme(); const {ctx,w,h}=setup($('cBar')); ctx.clearRect(0,0,w,h); const cmax=cmaxVal();
    const T=10,B=10, bh=h-T-B, x=2, bw=14;
    for(let k=0;k<bh;k++){ const u=1-k/(bh-1); let col; if(mode==='re') col=rdbu(2*u-1); else col=seqMap(u); ctx.fillStyle='rgb('+col[0]+','+col[1]+','+col[2]+')'; ctx.fillRect(x,T+k,bw,1); }
    ctx.strokeStyle=t.axis; ctx.lineWidth=1; ctx.strokeRect(x,T,bw,bh);
    ctx.fillStyle=t.muted; ctx.font='10px '+FONT; ctx.textAlign='left'; ctx.textBaseline='middle';
    const lx=x+bw+5;
    if(mode==='re'){ ctx.fillText('+'+cmax.toFixed(2),lx,T); ctx.fillText('0',lx,T+bh/2); ctx.fillText('−'+cmax.toFixed(2),lx,T+bh); }
    else { ctx.fillText(cmax.toFixed(2),lx,T); ctx.fillText('0',lx,T+bh); }
  }
  function fmtC(re,im){ return re.toFixed(2)+(im>=0?' + ':' − ')+Math.abs(im).toFixed(2)+' i'; }
  function updateDispVals(){
    const d=mq.matches, cA=d?'#5fa0e6':'#2f7dd1', cB=d?'#e8806d':'#d6604d';
    $('dispVals').innerHTML='<span style="color:'+cA+';font-weight:700;">α</span> = '+fmtC(alphaRe,alphaIm)+'<br><span style="color:'+cB+';font-weight:700;">β</span> = '+fmtC(betaRe,betaIm)+'';
  }
  function drawDisp(){
    const t=theme(), d=mq.matches; const {ctx,w,h}=setup($('cDisp')); ctx.clearRect(0,0,w,h);
    const PAD=20, S=Math.min(w,h)-2*PAD, cx=w/2, cy=h/2, R=S/2, DOM=1.55, sc=R/DOM;
    const mapx=re=>cx+re*sc, mapy=im=>cy-im*sc;
    ctx.strokeStyle=t.axis; ctx.lineWidth=1; ctx.globalAlpha=0.32;
    for(let g=-1;g<=1;g++){ if(g===0)continue; ctx.beginPath(); ctx.moveTo(mapx(g),cy-R); ctx.lineTo(mapx(g),cy+R); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx-R,mapy(g)); ctx.lineTo(cx+R,mapy(g)); ctx.stroke(); }
    ctx.globalAlpha=1;
    ctx.strokeStyle=t.muted; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
    ctx.fillStyle=t.muted; ctx.font='10px '+FONT;
    ctx.textAlign='right'; ctx.textBaseline='top'; ctx.fillText('Re',cx+R,cy+4);
    ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('Im',cx+4,cy-R);
    ctx.textAlign='center'; ctx.fillText('1',mapx(1),cy+4); ctx.fillText('−1',mapx(-1),cy+4);
    const cA=d?'#5fa0e6':'#2f7dd1', cB=d?'#e8806d':'#d6604d';
    const pt=(re,im,col,label)=>{ const x=mapx(re),y=mapy(im);
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI); ctx.fill();
      ctx.fillStyle=t.text; ctx.font='13px '+FONT; ctx.textAlign='left'; ctx.textBaseline='bottom'; ctx.fillText(label,x+7,y-4); };
    pt(alphaRe,alphaIm,cA,'α'); pt(betaRe,betaIm,cB,'β');
  }
  function draw(){
    renderMatrix($('cTrue'),trueR,trueI);
    renderMatrix($('cRec'), ran?recR:new Float64Array(81), ran?recI:new Float64Array(81));
    renderBar();
    drawDisp(); updateDispVals();
    $('capR').textContent=mode==='re'?'Re(ρ)':'|ρ|'; $('capH').textContent=mode==='re'?'Re(ρ̂)':'|ρ̂|';
    if(ran){ $('fid').innerHTML='𝓕 = <span style="color:var(--accent)">'+(fidelity*100).toFixed(1)+' %</span> &nbsp;·&nbsp; Rank(𝓜) = <span style="color:var(--accent)">'+mrank+' / 81</span>'; }
    else { $('fid').textContent=''; }
  }

  // ---- controls ----
  $('rK').oninput=e=>{curK=+e.target.value;$('oK').textContent=curK;};
  $('rK').onchange=()=>run();
  $('rSh').oninput=e=>{shots=+e.target.value;$('oSh').textContent=shots;};
  $('rSh').onchange=()=>run();
  $('cFixed').onchange=e=>{fixedDisp=e.target.checked; run();};
  function setCfg(c){
    if(c==='colinear'){ alphaRe=1; alphaIm=1; betaRe=-1; betaIm=-1; }
    else { alphaRe=1; alphaIm=1; betaRe=1; betaIm=-1; }
    $('cfgCol').setAttribute('aria-pressed', c==='colinear'?'true':'false');
    $('cfgInd').setAttribute('aria-pressed', c==='independent'?'true':'false');
    updateDispVals(); drawDisp(); run();
  }
  $('cfgCol').onclick=()=>setCfg('colinear');
  $('cfgInd').onclick=()=>setCfg('independent');

  if(mq.addEventListener) mq.addEventListener('change',draw);
  window.addEventListener('resize',draw);
  buildTrue(); requestAnimationFrame(run);
})();
</script>
</body>
